$kind: http-request
name: "03 - Get Current User"
url: "{{base_url}}/auth/api/auth/me"
method: GET
headers:
  Authorization: "Bearer {{access_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Returns 200', function () {
        pm.response.to.have.status(200);
      });
      const json = pm.response.json();
      pm.test('Has user_id and role travelers', function () {
        pm.expect(json).to.have.property('user_id');
        pm.expect(json.role).to.equal('travelers');
      });
      pm.collectionVariables.set('user_id', json.user_id);
      pm.collectionVariables.set('user_email', json.email);
      console.log('Simulated API GW injection:');
      console.log('  X-User-Id    =', json.user_id);
      console.log('  X-User-Email =', json.email);
    language: text/javascript
order: 3000
