$kind: http-request
name: Admin Approve Booking
url: "{{base_url}}/booking/api/booking/{{booking_id}}/admin-approve"
method: POST
headers:
  Authorization: "Bearer {{id_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Returns 200 with APPROVED status', function () {
        pm.response.to.have.status(200);
        pm.expect(pm.response.json().status).to.equal('APPROVED');
      });
      pm.test('No payment_reference yet', function () {
        pm.expect(pm.response.json().payment_reference).to.be.null;
      });
    language: text/javascript
order: 8000
