$kind: http-request
name: Admin Reject Reservation
url: "{{base_url}}/booking-orchestrator/api/reservations/{{booking_id}}/admin-reject"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{id_token}}
body:
  type: json
  content: |-
    {
      "reason": "La propiedad no está disponible para las fechas seleccionadas.",
      "traveler_email": "{{traveler_email}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Returns 200 OK', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Booking status is REJECTED', function () {
        const json = pm.response.json();
        pm.expect(json.status).to.eql('REJECTED');
      });
      pm.test('Response has rejection_reason', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('rejection_reason');
        pm.expect(json.rejection_reason).to.be.a('string').and.not.empty;
      });
    language: text/javascript
order: 4000
