$kind: http-request
name: Search Properties (Capacity Only)
url: "{{base_url}}/poc-properties/api/property?capacity=4"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Returns 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Returns an array', function () {
        pm.expect(pm.response.json()).to.be.an('array');
      });
    language: text/javascript
order: 3000
