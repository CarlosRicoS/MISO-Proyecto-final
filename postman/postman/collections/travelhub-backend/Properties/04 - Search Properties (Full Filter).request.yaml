$kind: http-request
name: Search Properties (Full Filter)
url: "{{base_url}}/poc-properties/api/property?city=Cartagena&capacity=4&startDate=01/06/2026&endDate=05/06/2026"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Returns 200', function () {
        pm.response.to.have.status(200);
      });
      const results = pm.response.json();
      pm.test('Returns an array', function () {
        pm.expect(results).to.be.an('array');
      });
      if (results.length > 0) {
        pm.collectionVariables.set('property_id', results[0].id);
        console.log('Saved property_id:', results[0].id);
      }
    language: text/javascript
order: 4000
