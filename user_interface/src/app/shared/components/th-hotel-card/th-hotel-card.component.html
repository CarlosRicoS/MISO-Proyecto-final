<ion-card class="th-hotel-card" [ngClass]="'th-hotel-card--' + variant">
  <div class="th-hotel-card__media" [ngClass]="{ 'th-hotel-card__media--empty': !imageUrl }">
    <img *ngIf="imageUrl" class="th-hotel-card__image" [src]="imageUrl" [alt]="title" />

    <!-- Favorite Button -->
    <ion-button class="th-hotel-card__favorite" *ngIf="showFavorite" aria-label="Favorite" fill="solid">
      <ion-icon name="heart-outline" aria-hidden="true"></ion-icon>
    </ion-button>
    
    <!-- Rating Badge -->
    <div class="th-hotel-card__rating">
      <th-badge variant="rating" icon="star">{{ rating }}</th-badge>
    </div>
  </div>

  <ion-card-content class="th-hotel-card__content">
    <div class="th-hotel-card__booking-top" *ngIf="variant === 'booking'; else defaultCardTop">
      <div class="th-hotel-card__header">
        <h3 class="th-hotel-card__title">{{ title }}</h3>
        <p class="th-hotel-card__location">
          <ion-icon name="location-outline" aria-hidden="true"></ion-icon>
          {{ location }}
        </p>
      </div>

      <div class="th-hotel-card__booking-status">
        <ng-content select="[th-card-status]"></ng-content>
      </div>

      <div class="th-hotel-card__booking-times">
        <ng-content select="[th-card-times]"></ng-content>
      </div>
    </div>

    <ng-template #defaultCardTop>
      <div class="th-hotel-card__header">
        <h3 class="th-hotel-card__title">{{ title }}</h3>
        <p class="th-hotel-card__location">
          <ion-icon name="location-outline" aria-hidden="true"></ion-icon>
          {{ location }}
        </p>
      </div>

      <div class="th-hotel-card__tags">
        <ng-content select="[th-card-tags]"></ng-content>
      </div>
    </ng-template>

    <div class="th-hotel-card__booking-meta" *ngIf="variant === 'booking'">
      <div class="th-hotel-card__booking-price">
        <span aria-hidden="true">
          <span class="th-hotel-card__price-label">{{ pricePrefix }}</span>
          <span class="th-hotel-card__price-value">{{ price }}</span>
          <span class="th-hotel-card__price-suffix">{{ priceSuffix }}</span>
        </span>
        <span class="sr-only">{{ pricePrefix }}{{ price }}{{ priceSuffix }}</span>
      </div>
      <div class="th-hotel-card__booking-cta">
        <th-button
          variant="primary"
          size="sm"
          [routerLink]="ctaRouterLink"
          (click)="ctaClick.emit()"
        >
          {{ ctaLabel }}
        </th-button>
      </div>
    </div>

    <!-- Price & CTA Footer -->
    <div class="th-hotel-card__footer" *ngIf="variant !== 'booking'">
      <div class="th-hotel-card__price">
        <span aria-hidden="true">
          <span class="th-hotel-card__price-label">{{ pricePrefix }}</span>
          <span class="th-hotel-card__price-value">{{ price }}</span>
          <span class="th-hotel-card__price-suffix">{{ priceSuffix }}</span>
        </span>
        <span class="sr-only">{{ pricePrefix }}{{ price }}{{ priceSuffix }}</span>
      </div>
      <div class="th-hotel-card__cta">
        <th-button
          variant="primary"
          size="sm"
          [routerLink]="ctaRouterLink"
          (click)="ctaClick.emit()"
        >
          {{ ctaLabel }}
        </th-button>
      </div>
    </div>
  </ion-card-content>
</ion-card>
