<ion-app [class.app-has-navbar]="hasTopBar" [class.app-no-navbar]="!hasTopBar">
  <ion-header *ngIf="showNavbar && !isMobileLayout" slot="fixed">
    <th-navbar [mode]="navbarMode" layout="desktop"></th-navbar>
  </ion-header>
  <ion-header
    *ngIf="showMobileTopBar && isMobileLayout"
    slot="fixed"
    [class.app-header--mobile-search-results]="isSearchResultsRoute"
  >
    <th-navbar [mode]="navbarMode" layout="mobile"></th-navbar>
  </ion-header>
  <ion-router-outlet
    class="site-content"
    [class.site-content--no-navbar]="!hasTopBar"
    [class.site-content--detail-mobile]="isPropertyDetailRoute"
  ></ion-router-outlet>
  <ion-footer slot="fixed" appPlatformText appPlatformShow="mobile" *ngIf="showNavbar && !isPropertyDetailRoute">
    <ion-toolbar class="mobile-tab-bar">
      <ion-buttons class="mobile-tab-bar__buttons" slot="start">
        <ion-button class="mobile-tab-bar__button" fill="clear" routerLink="/home" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
          <div class="stack-item">
            <ion-icon name="search"></ion-icon>
            <span class="mobile-tab-bar__label">Search</span>
          </div>
        </ion-button>
        <ion-button class="mobile-tab-bar__button" fill="clear" aria-label="Favorites">
          <div class="stack-item">
            <ion-icon name="heart-outline"></ion-icon>
            <span class="mobile-tab-bar__label">Favorites</span>
          </div>
        </ion-button>
        <ion-button class="mobile-tab-bar__button" fill="clear" aria-label="Bookings">
          <div class="stack-item">
            <ion-icon name="calendar-outline"></ion-icon>
            <span class="mobile-tab-bar__label">Bookings</span>
          </div>
        </ion-button>
        <ion-button class="mobile-tab-bar__button" fill="clear" aria-label="Profile">
          <div class="stack-item">
            <ion-icon name="person-outline"></ion-icon>
            <span class="mobile-tab-bar__label">Profile</span>
          </div>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-footer>
</ion-app>
