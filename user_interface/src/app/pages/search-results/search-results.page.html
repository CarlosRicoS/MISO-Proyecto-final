<ion-content
  class="search-results-content"
  [scrollEvents]="true"
  (ionScroll)="onContentScroll($event)"
>
  <section class="search-results-list">
    <h1 class="sr-only">Search Results</h1>
    <div class="search-results-list__sticky-header">
      <th-filter-summary class="search-results-list__summary" [filterParams]="filterSummaryParams"></th-filter-summary>

      <div class="search-results-list__inner">
        <p class="search-results-list__count" *ngIf="!isLoading && !errorMessage">
          {{ hotels.length }} {{ hotels.length === 1 ? 'hotel found' : 'hotels found' }}
          <span class="search-results-list__page-indicator">{{ currentPageLabel }}</span>
        </p>
      </div>
    </div>

    <div class="search-results-list__inner">
      <div class="search-results-list__cards" *ngIf="!isLoading && hotels.length">
        <th-hotel-card
          *ngFor="let hotel of hotels"
          class="search-results-card"
          variant="list"
          [title]="hotel.name || 'Hotel'"
          [location]="getHotelLocation(hotel)"
          [price]="getHotelPrice(hotel)"
          priceSuffix="/night"
          ctaLabel="View Details"
          [rating]="getHotelRating(hotel)"
          [imageUrl]="hotel.photos[0] || ''"
          [ctaRouterLink]="null"
          (ctaClick)="viewDetails(hotel)"
        ></th-hotel-card>
      </div>

      <ion-infinite-scroll
        threshold="120px"
        [disabled]="isLoading || isPaging || !canLoadNext"
        (ionInfinite)="loadMoreHotels($event)"
      >
        <ion-infinite-scroll-content
          loadingSpinner="bubbles"
          loadingText="Loading more hotels..."
        ></ion-infinite-scroll-content>
      </ion-infinite-scroll>

      <p class="search-results-empty" *ngIf="isLoading" aria-live="polite" aria-atomic="true">Loading hotels...</p>
      <p class="search-results-empty" *ngIf="!isLoading && errorMessage" role="alert" aria-live="assertive">{{ errorMessage }}</p>
      <p class="search-results-empty" *ngIf="!isLoading && !errorMessage && !hotels.length" aria-live="polite" aria-atomic="true">No hotels available for this search.</p>
    </div>
  </section>
</ion-content>
