<ion-alert
  [isOpen]="isAlertOpen"
  [header]="alertTitle"
  [message]="alertMessage"
  [buttons]="['OK']"
  (didDismiss)="isAlertOpen = false"
></ion-alert>

<ion-content [fullscreen]="true" class="login-content">
  <ion-grid class="login-shell">
    <ion-row class="login-row">
      <ion-col
        size="12"
        size-sm="10"
        size-md="8"
        size-lg="5"
        size-xl="4"
        class="login-col"
      >
        <ion-card class="login-card" aria-label="Login card">
          <ion-card-content class="login-card__content">
            <header class="login-card__header">
              <h1 class="login-card__title">Welcome Back</h1>
              <p class="login-card__subtitle">
                Sign in to your TravelHub account
              </p>
            </header>

            <div class="login-card__fields">
              <th-input
                label="Email"
                placeholder="Enter your email"
                type="email"
                [value]="email"
                [state]="emailState"
                [helper]="emailHelper"
                (valueChange)="onEmailChange($event)"
              ></th-input>
              <th-input
                label="Password"
                placeholder="Enter your password"
                type="password"
                [value]="password"
                [state]="passwordState"
                [helper]="passwordHelper"
                (valueChange)="onPasswordChange($event)"
              ></th-input>
            </div>

            <div class="login-card__cta">
              <th-button expand="block" size="md" (click)="onSignIn()">Sign In</th-button>
            </div>

            <ion-button fill="clear" size="small" class="login-card__link">
              Forgot Password?
            </ion-button>

            <p class="login-card__signup">
              Don't have an account?
              <ion-button fill="clear" class="login-card__link-inline">
                Sign Up
              </ion-button>
            </p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
