<ion-content class="bookingdetail-content">
  <th-popup
    [isOpen]="isCancelConfirmOpen"
    variant="warning"
    title="Cancel booking"
    [message]="cancelConfirmMessage"
    primaryButtonText="Accept"
    secondaryButtonText="Cancel"
    primaryButtonVariant="secondary"
    secondaryButtonVariant="primary"
    (primaryAction)="onCancelConfirmed()"
    (closed)="isCancelConfirmOpen = false"
  ></th-popup>

  <th-popup
    [isOpen]="isAlertOpen"
    [variant]="alertVariant"
    [title]="alertTitle"
    [message]="alertMessage"
    primaryButtonText="Accept"
    [closeOnBackdrop]="false"
    (primaryAction)="onAlertDismissed()"
  ></th-popup>

  <section class="bookingdetail-main" *ngIf="!isLoading && !errorMessage">
    <div class="bookingdetail-main__inner">
      <div class="bookingdetail-main__left">
        <section class="bookingdetail-hero">
          <div class="bookingdetail-hero__inner">
            <th-details-mosaic
              [hotelName]="property.title"
              [images]="property.images"
              [totalPhotos]="property.totalPhotos"
              [viewAllLabel]="'View all ' + property.totalPhotos + ' photos'"
            ></th-details-mosaic>
          </div>
        </section>

        <section class="bookingdetail-summary">
          <div class="bookingdetail-summary__inner">
            <th-detail-summary
              [title]="property.title"
              [location]="property.location"
              [showSaveAction]="false"
              [showShareAction]="true"
              [showRatingRow]="false"
              [statusText]="bookingStatus || 'Upcoming'"
              [statusVariant]="bookingStatusVariant"
              [metaPrimary]="bookingDateRange"
              [metaSecondary]="bookingNights"
            ></th-detail-summary>
          </div>
        </section>

        <section class="bookingdetail-body">
          <div class="bookingdetail-body__inner">
            <div class="bookingdetail-body__details">
              <th-amenities-summary
                [amenities]="amenities"
                [totalAmenities]="amenities.length"
                viewAllLabel="View All Amenities"
              ></th-amenities-summary>

              <th-property-description-summary
                title="About This Hotel"
                [paragraphs]="descriptionParagraphs"
                readMoreLabel="Read More"
                readLessLabel="Read Less"
              ></th-property-description-summary>

              <th-property-review-summary
                title="Guest Reviews"
                desktopActionLabel="Write a review"
                mobileActionLabel="See All"
                loadMoreLabel="Load more reviews"
                [categoryScores]="reviewCategoryScores"
                [reviews]="guestReviews"
              ></th-property-review-summary>
            </div>
          </div>
        </section>
      </div>

      <aside class="bookingdetail-main__right">
        <!-- Accordion for Confirmed/Upcoming -->
        <div class="bookingdetail-accordion" *ngIf="isAccordionLayout && !isMobileViewport">
          <!-- Item 1: Cancel Reservation -->
          <div class="bookingdetail-accordion__item" *ngIf="showCancelAccordion">
            <button
              class="bookingdetail-accordion__header"
              (click)="toggleCancelAccordion()"
              [attr.aria-expanded]="isCancelAccordionOpen"
            >
              <span class="bookingdetail-accordion__title bookingdetail-accordion__title--danger">
                <ion-icon name="close-circle-outline" aria-hidden="true"></ion-icon>
                Cancel Reservation
              </span>
              <ion-icon
                name="chevron-down-outline"
                [class.bookingdetail-accordion__chevron--open]="isCancelAccordionOpen"
                aria-hidden="true"
              ></ion-icon>
            </button>

            <div
              class="bookingdetail-accordion__content bookingdetail-accordion__content--danger"
              [class.bookingdetail-accordion__content--open]="isCancelAccordionOpen"
            >
              <th-payment-summary
                [title]="paymentSummary.title"
                subtitle="per night"
                promoText="Reservation details"
                [checkInValue]="paymentSummary.checkInValue"
                [checkOutValue]="paymentSummary.checkOutValue"
                [guestsValue]="paymentSummary.guestsValue"
                [roomTypeValue]="paymentSummary.roomTypeValue"
                [items]="summaryItems"
                totalLabel="Total"
                [totalAmount]="paymentSummary.totalAmount"
                actionLabel="Cancel Reservation"
                [actionDisabled]="isCancelling || isCancellationPolicyLoading"
                [isLoading]="isCancelling || isCancellationPolicyLoading"
                (actionClick)="onCancelBooking()"
                footnote="Cancellation policies may apply"
                trustLeftLabel="Secure booking"
                trustRightLabel="Flexible cancellation"
                [editable]="false"
                [mobileSticky]="false"
              ></th-payment-summary>
            </div>
          </div>

          <!-- Item 2: Change Dates -->
          <div class="bookingdetail-accordion__item" *ngIf="showChangeDatesAccordion">
            <button
              class="bookingdetail-accordion__header"
              (click)="toggleChangeDatesAccordion()"
              [attr.aria-expanded]="isChangeDatesAccordionOpen"
            >
              <span class="bookingdetail-accordion__title">
                <ion-icon name="calendar-outline" aria-hidden="true"></ion-icon>
                Change Dates
              </span>
              <ion-icon
                name="chevron-down-outline"
                [class.bookingdetail-accordion__chevron--open]="isChangeDatesAccordionOpen"
                aria-hidden="true"
              ></ion-icon>
            </button>

            <div
              class="bookingdetail-accordion__content"
              [class.bookingdetail-accordion__content--open]="isChangeDatesAccordionOpen"
            >
              <th-payment-summary
                [title]="paymentSummary.title"
                subtitle="per night"
                promoText="Update Your Dates"
                [checkInValue]="paymentSummary.checkInValue"
                [checkOutValue]="paymentSummary.checkOutValue"
                [guestsValue]="paymentSummary.guestsValue"
                [roomTypeValue]="paymentSummary.roomTypeValue"
                [items]="summaryItems"
                totalLabel="Total"
                [totalAmount]="paymentSummary.totalAmount"
                actionLabel="Recalculate Price"
                [actionDisabled]="isRecalculating"
                [isLoading]="isRecalculating"
                (actionClick)="onRecalculatePrice()"
                (checkInValueChange)="onCheckInChanged($event)"
                (checkOutValueChange)="onCheckOutChanged($event)"
                (guestsValueChange)="onGuestsChanged($event)"
                [footnote]="hasDateChanges ? '✓ Dates updated - ready to recalculate' : 'Select new dates to update'"
                trustLeftLabel="Secure booking"
                trustRightLabel="Flexible cancellation"
                [editable]="true"
                [mobileSticky]="false"
                [editorResetTrigger]="paymentSummaryResetVersion"
              ></th-payment-summary>
            </div>
          </div>
        </div>

        <!-- Flat cancel-only summary for Upcoming status -->
        <th-payment-summary
          *ngIf="isFlatCancelLayout && !isMobileViewport"
          class="bookingdetail-flat-cancel-summary"
          [title]="paymentSummary.title"
          subtitle="per night"
          promoText="Reservation details"
          [checkInValue]="paymentSummary.checkInValue"
          [checkOutValue]="paymentSummary.checkOutValue"
          [guestsValue]="paymentSummary.guestsValue"
          [roomTypeValue]="paymentSummary.roomTypeValue"
          [items]="summaryItems"
          totalLabel="Total"
          [totalAmount]="paymentSummary.totalAmount"
          actionLabel="Cancel Reservation"
          [actionDisabled]="isCancelling || isCancellationPolicyLoading"
          [isLoading]="isCancelling || isCancellationPolicyLoading"
          (actionClick)="onCancelBooking()"
          footnote="Cancellation policies may apply"
          trustLeftLabel="Secure booking"
          trustRightLabel="Flexible cancellation"
          [editable]="false"
          [mobileSticky]="false"
        ></th-payment-summary>

        <!-- Flat editable summary for Rejected status -->
        <th-payment-summary
          *ngIf="isFlatChangeDatesLayout && !isMobileViewport"
          [title]="paymentSummary.title"
          subtitle="per night"
          promoText="Update Your Dates"
          [checkInValue]="paymentSummary.checkInValue"
          [checkOutValue]="paymentSummary.checkOutValue"
          [guestsValue]="paymentSummary.guestsValue"
          [roomTypeValue]="paymentSummary.roomTypeValue"
          [items]="summaryItems"
          totalLabel="Total"
          [totalAmount]="paymentSummary.totalAmount"
          actionLabel="Recalculate Price"
          [actionDisabled]="isRecalculating"
          [isLoading]="isRecalculating"
          (actionClick)="onRecalculatePrice()"
          (checkInValueChange)="onCheckInChanged($event)"
          (checkOutValueChange)="onCheckOutChanged($event)"
          (guestsValueChange)="onGuestsChanged($event)"
          [footnote]="hasDateChanges ? '✓ Dates updated - ready to recalculate' : 'Select new dates to update'"
          trustLeftLabel="Secure booking"
          trustRightLabel="Flexible cancellation"
          [editable]="true"
          [mobileSticky]="false"
          [editorResetTrigger]="paymentSummaryResetVersion"
        ></th-payment-summary>

        <!-- Regular read-only mode (Canceled/Completed) -->
        <th-payment-summary
          *ngIf="!isEditableStatus"
          [title]="paymentSummary.title"
          subtitle="per night"
          [promoText]="paymentSummary.promoText"
          [checkInValue]="paymentSummary.checkInValue"
          [checkOutValue]="paymentSummary.checkOutValue"
          [guestsValue]="paymentSummary.guestsValue"
          [roomTypeValue]="paymentSummary.roomTypeValue"
          [items]="summaryItems"
          totalLabel="Total"
          [totalAmount]="paymentSummary.totalAmount"
          [hideAfterTotal]="isCancellationHiddenForStatus"
          actionLabel="Cancel"
          [showAction]="!isCancellationHiddenForStatus"
          [actionDisabled]="isCancelling || isCancellationPolicyLoading"
          [isLoading]="isCancelling || isCancellationPolicyLoading"
          (actionClick)="onCancelBooking()"
          footnote="Cancellation policies may apply"
          trustLeftLabel="Secure booking"
          trustRightLabel="Flexible cancellation"
          [editable]="false"
          [mobileSticky]="true"
          [editorResetTrigger]="paymentSummaryResetVersion"
          compactSuffix="/night"
          compactNote="Taxes and fees included"
        ></th-payment-summary>

        <ion-card class="bookingdetail-cancellation-card" *ngIf="!isCancellationHiddenForStatus">
          <ion-card-content>
            <div class="bookingdetail-cancellation-card__header">
              <ion-icon name="information-circle" aria-hidden="true"></ion-icon>
              <h3>Flexible Cancellation</h3>
            </div>
            <p>
              Free cancellation until 24 hours before check-in. After that, cancellation fees may apply
              based on the reservation policy.
            </p>
          </ion-card-content>
        </ion-card>

        <th-payment-summary
          class="bookingdetail-mobile-summary"
          *ngIf="showMobileStickyPanel"
          [title]="paymentSummary.title"
          subtitle="per night"
          [promoText]="mobilePanelPromoText"
          [checkInValue]="paymentSummary.checkInValue"
          [checkOutValue]="paymentSummary.checkOutValue"
          [guestsValue]="paymentSummary.guestsValue"
          [roomTypeValue]="paymentSummary.roomTypeValue"
          [items]="summaryItems"
          totalLabel="Total"
          [totalAmount]="paymentSummary.totalAmount"
          [hideAfterTotal]="mobilePanelHideAfterTotal"
          [showAction]="mobilePanelShowAction"
          [actionLabel]="mobilePanelActionLabel"
          [actionDisabled]="mobilePanelActionDisabled"
          [isLoading]="mobilePanelIsLoading"
          (actionClick)="onMobilePanelAction()"
          [footnote]="mobilePanelFootnote"
          trustLeftLabel="Secure booking"
          trustRightLabel="Flexible cancellation"
          [editable]="mobilePanelEditable"
          [mobileSticky]="true"
          [editorResetTrigger]="paymentSummaryResetVersion"
          [compactTabs]="mobilePanelTabs"
          [compactActiveTabId]="mobileConfirmedTab"
          (compactTabChange)="onMobileConfirmedTabSelected($event)"
          compactSuffix="/night"
          compactNote="Taxes and fees included"
          (checkInValueChange)="onCheckInChanged($event)"
          (checkOutValueChange)="onCheckOutChanged($event)"
          (guestsValueChange)="onGuestsChanged($event)"
        ></th-payment-summary>
      </aside>
    </div>
  </section>

  <p class="bookingdetail-empty" *ngIf="isLoading" aria-live="polite" aria-atomic="true">Loading booking details...</p>
  <p class="bookingdetail-empty" *ngIf="!isLoading && errorMessage" role="alert" aria-live="assertive">{{ errorMessage }}</p>
</ion-content>
