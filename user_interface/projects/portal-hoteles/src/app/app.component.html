<ion-app class="portal-hoteles-app" [class.portal-hoteles-app--login]="!showNavbar">
  <ng-container *ngIf="showNavbar; else loginLayout">
    <div class="portal-hoteles-shell">
      <div class="portal-hoteles-shell__header">
        <portal-hoteles-header-bar></portal-hoteles-header-bar>
      </div>

      <section class="portal-hoteles-shell__body">
        <div class="portal-hoteles-shell__sidebar">
          <portal-hoteles-side-nav (logoutClicked)="onLogout()"></portal-hoteles-side-nav>
        </div>

        <div class="portal-hoteles-shell__content-inner">
          <div class="portal-hoteles-shell__content">
            <ion-router-outlet></ion-router-outlet>
          </div>
        </div>
      </section>
    </div>
  </ng-container>

  <ng-template #loginLayout>
    <ion-router-outlet></ion-router-outlet>
  </ng-template>
</ion-app>
