load_module modules/ngx_http_js_module.so;

events {
    worker_connections 1024;
}

http {
    error_log /var/log/nginx/error.log info;

    js_import jwt from /etc/nginx/jwt.js;
    js_set $jwt_user_id jwt.userId;
    js_set $jwt_user_email jwt.userEmail;
    js_set $jwt_valid jwt.isValid;

    # --- upstreams ---------------------------------------------------------
    upstream auth            { server auth:80; }
    upstream booking         { server booking:80; }
    upstream booking-orchestrator { server booking-orchestrator:80; }
    upstream notifications   { server notifications:80; }
    upstream pms             { server pms:80; }
    upstream poc-properties  { server poc-properties:8080; }
    upstream billing         { server billing:8080; }
    upstream stripe-mock     { server stripe-mock:8080; }
    upstream pricing-engine  { server pricing-engine:8080; }
    upstream pricing-orchestator { server pricing-orchestator:8080; }

    server {
        listen 80;

        # Strip CORS headers that upstream services may set (avoid duplicates)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Gateway is the single source of truth for CORS
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "*" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "*" always;

        # ---------- OPTIONS preflight (all routes) -------------------------
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ===================================================================
        # PUBLIC ROUTES (no JWT required)
        # ===================================================================

        location /auth/ {
            proxy_pass http://auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /poc-properties/ {
            proxy_pass http://poc-properties/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /pricing-engine/ {
            proxy_pass http://pricing-engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /pricing-orchestator/ {
            proxy_pass http://pricing-orchestator/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /billing/ {
            proxy_pass http://billing/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /stripe-mock/ {
            proxy_pass http://stripe-mock/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ===================================================================
        # PROTECTED ROUTES (JWT required — inject X-User-Id, X-User-Email)
        # ===================================================================

        location /booking/ {
            if ($jwt_valid = '0') {
                return 401 '{"message":"Unauthorized"}';
            }
            proxy_set_header X-User-Id    $jwt_user_id;
            proxy_set_header X-User-Email $jwt_user_email;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://booking/;
        }

        location /booking-orchestrator/ {
            if ($jwt_valid = '0') {
                return 401 '{"message":"Unauthorized"}';
            }
            proxy_set_header X-User-Id    $jwt_user_id;
            proxy_set_header X-User-Email $jwt_user_email;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://booking-orchestrator/;
        }

        location /pms/ {
            if ($jwt_valid = '0') {
                return 401 '{"message":"Unauthorized"}';
            }
            proxy_set_header X-User-Id    $jwt_user_id;
            proxy_set_header X-User-Email $jwt_user_email;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://pms/;
        }
    }
}
