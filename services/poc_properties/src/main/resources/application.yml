server:
  port: 8080
  servlet:
    context-path: /api

travelhub:
  database:
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    host: ${DB_HOST:localhost}
    name: ${DB_NAME:postgres}

spring:
  datasource:
    hikari:
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:50}
    url: jdbc:postgresql://${travelhub.database.host}:5432/${travelhub.database.name}?currentSchema=public
    username: ${travelhub.database.user}
    password: ${travelhub.database.password}
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: ${JPA_SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
      show-sql: true
      properties:
        hibernate:
          format_sql: true
  application:
    name: poc_properties

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,traces
  endpoint:
    prometheus:
      enabled: true

logging:
  include-details: true