server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    hikari:
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:50}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=public}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driverClassName: org.postgresql.Driver
  jpa:
    show-sql: ${JPA_SHOW_SQL:true}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
      show-sql: true
      properties:
        hibernate:
          format_sql: true
  application:
    name: poc_properties

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,traces
  endpoint:
    prometheus:
      enabled: true

logging:
  include-details: true