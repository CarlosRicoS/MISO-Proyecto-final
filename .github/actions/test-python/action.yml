name: Test Python Base Action
author: ay.henao
description: Test a Python Base Application
inputs:
  python-version:
    description: 'Python version'
    required: false
    default: '3.12'
  uv-version:
    description: 'UV Version to be used'
    required: false
    default: 'latest'
  context-path:
    description: 'Path to the Content'
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: ${{ inputs.uv-version }}

    - name: Run unit tests
      shell: bash
      run: make unittest-uv DIR=${{ inputs.context-path }}