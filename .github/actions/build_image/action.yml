name: Build Image and Push to ECR
author: ay.henao
description: Build a Docker image and push it to AWS ECR
inputs:
  aws-region:
    description: 'AWS region where the ECR repository is located'
    required: true
    default: 'us-east-1'
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  aws-session-token:
    description: 'AWS Session Token (if using temporary credentials)'
    required: false
    default: ''
  ecr-repo:
    description: 'Name of the ECR repository'
    required: true
    default: 'my-ecr-repo'
  image-tag:
    description: 'Tag for the Docker image'
    required: true
    default: 'latest'
  context-path:
    description: 'Path to the Content to build the Docker image'
    required: true
outputs:
  ecr-registry:
    description: 'URI of the ECR registry'
    value: ${{ steps.login-ecr.outputs.registry }}
  image-uri:
    description: 'URI of the pushed Docker image'
    value: ${{ steps.push-image.outputs.image-uri }}
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      id: aws-credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-session-token: ${{ inputs.aws-session-token }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build tag and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ inputs.ecr-repo }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        CONTEXT_PATH: ${{ inputs.context-path }}
      shell: bash
      run: |
        cd $CONTEXT_PATH
        IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG
        LATEST_URI=$REGISTRY/$REPOSITORY:latest
        echo "Building image: $IMAGE_URI"
        docker build -t $IMAGE_URI -t $LATEST_URI .
        docker push $IMAGE_URI
        # Always push latest so terraform plan can resolve the ECR image digest
        docker push $LATEST_URI
        echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
