name: Test .NET Base Action
author: ay.henao
description: Test a .NET Application
inputs:
  dotnet-version:
    description: '.NET SDK version'
    required: false
    default: '8.0.x'
  context-path:
    description: 'Path to the .NET solution/project directory'
    required: true
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore dependencies
      shell: bash
      run: |
        cd ${{ inputs.context-path }}
        dotnet restore

    - name: Run tests with coverage
      shell: bash
      run: |
        cd ${{ inputs.context-path }}
        dotnet test --no-restore --verbosity normal --collect:"XPlat Code Coverage"
