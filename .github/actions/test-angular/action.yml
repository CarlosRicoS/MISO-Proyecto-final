name: Test Angular Base Action
description: Test an Angular application with Karma/Jasmine and enforce 85% coverage (statements, branches, functions, lines)
inputs:
  context-path:
    description: 'Path to the Angular project (containing package.json)'
    required: true
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.context-path }}/package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ inputs.context-path }}
        npm ci

    - name: Fetch base branch for guardrail diff context
      shell: bash
      run: |
        if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
          git fetch --no-tags --depth=200 origin "refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}" || true
        fi

    - name: Run lint and frontend guardrails
      shell: bash
      run: |
        cd ${{ inputs.context-path }}
        npm run lint:ci

    - name: Run tests and check coverage
      shell: bash
      run: |
        cd ${{ inputs.context-path }}
        npx ng test --watch=false --browsers=ChromeHeadless --no-progress