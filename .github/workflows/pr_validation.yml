name: PR Validation
on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: auth
            language: python
            context-path: services/auth
          - name: booking
            language: python
            context-path: services/booking
          - name: booking-orchestrator
            language: python
            context-path: services/booking_orchestrator
          - name: notifications
            language: python
            context-path: services/notifications
          - name: poc-properties
            language: java
            context-path: services/poc_properties
    name: Test ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Python tests
        if: matrix.language == 'python'
        uses: ./.github/actions/test-python
        with:
          context-path: ${{ matrix.context-path }}

      - name: Run Java tests
        if: matrix.language == 'java'
        uses: ./.github/actions/test-java
        with:
          context-path: ${{ matrix.context-path }}

  test_frontend:
    name: Test travelhub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Angular tests
        uses: ./.github/actions/test-angular
        with:
          context-path: user_interface

  build_and_push:
    runs-on: ubuntu-latest
    environment: develop
    needs: [ test ]
    strategy:
      matrix:
        include:
          - name: auth
            language: python
            ecr-repo: api_auth
            context-path: services/auth
          - name: booking
            language: python
            ecr-repo: api_booking
            context-path: services/booking
          - name: booking_orchestrator
            language: python
            ecr-repo: api_booking_orchestrator
            context-path: services/booking_orchestrator
          - name: notifications
            language: python
            ecr-repo: api_notifications
            context-path: services/notifications
          - name: poc_properties
            language: java
            ecr-repo: api_poc_properties
            context-path: services/poc_properties
    name: Build ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Java services)
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build JAR with Maven (Java services)
        if: matrix.language == 'java'
        run: |
          cd ${{ matrix.context-path }}
          ./mvnw clean install -DskipTests

      - name: Build and Push Docker Image to ECR
        uses: ./.github/actions/build_image
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          ecr-repo: ${{ matrix.ecr-repo }}
          image-tag: ${{ github.sha }}
          context-path: ${{ matrix.context-path }}

  build_web_image:
    name: Build travelhub
    runs-on: ubuntu-latest
    needs: [ test_frontend ]
    environment: develop
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push Docker Image to ECR
        uses: ./.github/actions/build_image
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          ecr-repo: web_travelhub
          image-tag: ${{ github.sha }}
          context-path: user_interface

  terraform_plan:
    runs-on: ubuntu-latest
    environment: develop
    needs: [ test, build_and_push, build_web_image ]
    strategy:
      fail-fast: false
      matrix:
        stack:
          - container_registry
          - database
          - cognito
          - messaging
          - ecs_api
          - api_gateway
          - web_app
    name: Plan ${{ matrix.stack }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Terraform Plan
        uses: ./.github/actions/terraform_plan
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: develop
          terraform_stack: ${{ matrix.stack }}
