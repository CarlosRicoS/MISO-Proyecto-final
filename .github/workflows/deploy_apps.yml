name: Deploy Applications
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        description: 'Select the target environment'
        options:
          - develop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: pms
            language: python
            context-path: services/pms
          - name: auth
            language: python
            context-path: services/auth
          - name: booking
            language: python
            context-path: services/booking
          - name: booking-orchestrator
            language: python
            context-path: services/booking_orchestrator
          - name: notifications
            language: python
            context-path: services/notifications
    name: Test ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Python tests
        if: matrix.language == 'python'
        uses: ./.github/actions/test-python
        with:
          context-path: ${{ matrix.context-path }}

  deploy_ecs_cluster_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy ecs_cluster stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: ecs_cluster

  deploy_container_registry_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy container_registry stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: container_registry

  deploy_cognito_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy cognito stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: cognito

  build_and_push:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [test, deploy_container_registry_stack]
    strategy:
      matrix:
        include:
          - name: hello_world
            language: python
            ecr-repo: api_hello_world
            context-path: services/hello_world
          - name: pms
            language: python
            ecr-repo: api_pms
            context-path: services/pms
          - name: auth
            language: python
            ecr-repo: api_auth
            context-path: services/auth
          - name: booking
            language: python
            ecr-repo: api_booking
            context-path: services/booking
          - name: booking_orchestrator
            language: python
            ecr-repo: api_booking_orchestrator
            context-path: services/booking_orchestrator
          - name: notifications
            language: python
            ecr-repo: api_notifications
            context-path: services/notifications
          - name: poc_properties
            language: java
            ecr-repo: api_poc_properties
            context-path: services/poc_properties
          - name: pricing_engine
            language: dotnet
            ecr-repo: api_pricing_engine
            context-path: services/PricingEngine
          - name: pricing_orchestator
            language: dotnet
            ecr-repo: api_pricing_orchestator
            context-path: services/PricingOrchestator
          - name: travelhub
            language: node
            ecr-repo: web_travelhub
            context-path: user_interface
    name: Build and Push ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Java services)
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build JAR with Maven (Java services)
        if: matrix.language == 'java'
        run: |
          cd ${{ matrix.context-path }}
          ./mvnw clean install -DskipTests

      - name: Build and Push Docker Image to ECR
        uses: ./.github/actions/build_image
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr-repo: ${{ matrix.ecr-repo }}
          image-tag: latest
          context-path: ${{ matrix.context-path }}

  deploy_monitoring_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [deploy_ecs_cluster_stack]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy monitoring stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: monitoring

  deploy_database_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [deploy_ecs_cluster_stack]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy database stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: database

  deploy_messaging_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy messaging stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: messaging

  deploy_ecs_api_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [build_and_push, deploy_database_stack, deploy_ecs_cluster_stack, deploy_cognito_stack, deploy_messaging_stack]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy ecs_api stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: ecs_api

  deploy_api_gateway_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [deploy_ecs_api_stack, deploy_cognito_stack]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy api_gateway stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: api_gateway

  deploy_web_app_stack:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [build_and_push, deploy_api_gateway_stack]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy web_app stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: web_app
