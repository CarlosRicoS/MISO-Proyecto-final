name: Deploy Single Stack

on:
  workflow_dispatch:
    inputs:
      stack:
        description: 'Terraform stack to deploy'
        required: true
        type: choice
        default: ecs_api
        options:
          - ecs_cluster
          - container_registry
          - database
          - cognito
          - ecs_api
          - api_gateway
          - monitoring
          - web_app
      environment:
        description: 'Target environment'
        required: true
        default: 'develop'
        type: choice
        options:
          - develop

jobs:
  # Builds and pushes all backend service images.
  # Runs only when deploying ecs_api (the stack that creates ECS task definitions for backend services).
  build_backend_images:
    name: Build and Push ${{ matrix.name }}
    if: ${{ inputs.stack == 'ecs_api' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      matrix:
        include:
          - name: pms
            language: python
            ecr-repo: api_pms
            context-path: services/pms
          - name: auth
            language: python
            ecr-repo: api_auth
            context-path: services/auth
          - name: booking
            language: python
            ecr-repo: api_booking
            context-path: services/booking
          - name: booking_orchestrator
            language: python
            ecr-repo: api_booking_orchestrator
            context-path: services/booking_orchestrator
          - name: notifications
            language: python
            ecr-repo: api_notifications
            context-path: services/notifications
          - name: poc_properties
            language: java
            ecr-repo: api_poc_properties
            context-path: services/poc_properties
          - name: billing
            language: java
            ecr-repo: api_billing
            context-path: services/billing
          - name: stripe_mock
            language: java
            ecr-repo: api_stripe_mock
            context-path: services/stripe_mock
          - name: pricing_engine
            language: dotnet
            ecr-repo: api_pricing_engine
            context-path: services/PricingEngine
          - name: pricing_orchestator
            language: dotnet
            ecr-repo: api_pricing_orchestator
            context-path: services/PricingOrchestator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Java services)
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build JAR with Maven (Java services)
        if: matrix.language == 'java'
        run: |
          cd ${{ matrix.context-path }}
          ./mvnw clean install -DskipTests

      - name: Build and Push Docker Image to ECR
        uses: ./.github/actions/build_image
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr-repo: ${{ matrix.ecr-repo }}
          image-tag: latest
          context-path: ${{ matrix.context-path }}

  # Runs Angular/Jasmine/Karma tests with coverage enforcement (85%) before building.
  # Runs only when deploying web_app.
  test_web_app:
    name: Test travelhub
    if: ${{ inputs.stack == 'web_app' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Angular tests
        uses: ./.github/actions/test-angular
        with:
          context-path: user_interface

  # Runs Playwright E2E tests against the Angular dev server (all API calls mocked via page.route).
  # Runs only when deploying web_app.
  test_e2e:
    name: E2E travelhub (Playwright)
    if: ${{ inputs.stack == 'web_app' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Playwright E2E tests
        uses: ./.github/actions/test-playwright
        with:
          context-path: user_interface

  # Builds and pushes the web app (SPA) image.
  # Runs only when deploying web_app and after tests pass.
  build_web_image:
    name: Build and Push travelhub
    if: ${{ inputs.stack == 'web_app' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [test_web_app, test_e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push Docker Image to ECR
        uses: ./.github/actions/build_image
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ecr-repo: web_travelhub
          image-tag: latest
          context-path: user_interface

  # After a new web_travelhub image is pushed, connect to the EC2 instance via SSM Run Command
  # and pull + restart the container — no SSH required.
  # Runs only when deploying web_app and after the image build succeeds.
  redeploy_web_container:
    name: Redeploy travelhub container on EC2
    if: ${{ inputs.stack == 'web_app' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [build_web_image]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Find EC2 instance ID by tag
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=final-project-miso-web-app" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Error: no running EC2 instance found with tag Name=final-project-miso-web-app"
            exit 1
          fi

          echo "Found instance: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Send redeploy command via SSM
        id: ssm-command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.find-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Redeploy travelhub container" \
            --parameters 'commands=[
              "set -e",
              "REGION=us-east-1",
              "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)",
              "ECR_URL=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com",
              "IMAGE=$ECR_URL/web_travelhub:latest",
              "echo Authenticating with ECR...",
              "aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ECR_URL",
              "echo Pulling latest image: $IMAGE",
              "docker pull $IMAGE",
              "echo Fetching API Gateway URL from SSM...",
              "API_BASE_URL=$(aws ssm get-parameter --name /final-project-miso/api-gateway/url --region $REGION --query Parameter.Value --output text)",
              "echo Restarting container...",
              "docker stop travelhub || true",
              "docker rm travelhub || true",
              "docker run -d --name travelhub --restart always -p 80:80 -e API_BASE_URL=$API_BASE_URL $IMAGE",
              "echo Container redeployed successfully."
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM command to complete
        run: |
          INSTANCE_ID="${{ steps.find-instance.outputs.instance_id }}"
          COMMAND_ID="${{ steps.ssm-command.outputs.command_id }}"

          echo "Waiting for command $COMMAND_ID on $INSTANCE_ID..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)

          echo "--- SSM command output ---"
          echo "$OUTPUT"
          echo "--------------------------"

          if [ "$STATUS" != "Success" ]; then
            ERROR=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text)
            echo "--- SSM command error ---"
            echo "$ERROR"
            echo "Command failed with status: $STATUS"
            exit 1
          fi

          echo "Container redeployed successfully."

  # Runs terraform apply for the selected stack.
  # Waits for image builds when needed; proceeds immediately for infra-only stacks.
  # Uses !contains(...failure/cancelled) so skipped build jobs don't block this job.
  deploy_stack:
    name: Deploy ${{ inputs.stack }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [build_backend_images, test_web_app, test_e2e, build_web_image, redeploy_web_container]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy ${{ inputs.stack }} stack
        uses: ./.github/actions/terraform_apply
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          terraform_environment: ${{ inputs.environment }}
          terraform_stack: ${{ inputs.stack }}