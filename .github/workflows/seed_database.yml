name: Seed Database

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'Path to the SQL file to run (relative to repo root)'
        required: true
        default: 'db/seeds/pricing-engine/001_seed_pricing_data.sql'
      service_name:
        description: 'Target service name (used to look up DB name from SSM, e.g. pricing-engine, poc-properties)'
        required: true
        default: 'pricing-engine'
      environment:
        description: 'Target Environment'
        required: true
        default: 'develop'
        type: choice
        options:
          - develop

jobs:
  seed_database:
    name: Run SQL Script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Retrieve Database Credentials
        id: db-creds
        run: |
          PROJECT_NAME="final-project-miso"
          SERVICE_NAME="${{ inputs.service_name }}"

          echo "Retrieving SSM parameters for project: $PROJECT_NAME, service: $SERVICE_NAME..."

          DB_HOST=$(aws ssm get-parameter --name "/$PROJECT_NAME/rds/host" --query "Parameter.Value" --output text)
          DB_PORT=$(aws ssm get-parameter --name "/$PROJECT_NAME/rds/port" --query "Parameter.Value" --output text)
          DB_USER=$(aws ssm get-parameter --name "/$PROJECT_NAME/rds/username" --with-decryption --query "Parameter.Value" --output text)
          DB_PASSWORD=$(aws ssm get-parameter --name "/$PROJECT_NAME/rds/password" --with-decryption --query "Parameter.Value" --output text)
          DB_NAME=$(aws ssm get-parameter --name "/$PROJECT_NAME/$SERVICE_NAME/db_name" --query "Parameter.Value" --output text)

          # Mask sensitive data in logs
          echo "::add-mask::$DB_HOST"
          echo "::add-mask::$DB_USER"
          echo "::add-mask::$DB_PASSWORD"

          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV
          echo "DB_PORT=$DB_PORT" >> $GITHUB_ENV
          echo "DB_USER=$DB_USER" >> $GITHUB_ENV
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV
          echo "DB_NAME=$DB_NAME" >> $GITHUB_ENV

      - name: Execute SQL Script
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          SQL_FILE="${{ inputs.sql_file }}"
          echo "Running SQL script: $SQL_FILE against database: ${{ env.DB_NAME }}"

          if [ ! -f "$SQL_FILE" ]; then
            echo "Error: SQL file '$SQL_FILE' not found!"
            exit 1
          fi

          psql \
            -h "${{ env.DB_HOST }}" \
            -p "${{ env.DB_PORT }}" \
            -U "${{ env.DB_USER }}" \
            -d "${{ env.DB_NAME }}" \
            -f "$SQL_FILE"

          echo "SQL script executed successfully."